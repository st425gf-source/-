<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة دحيح التعليمية 2026</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root { --primary: #2563eb; --accent: #f59e0b; --bg: #f8fafc; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #1e293b; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        header { background: var(--primary); color: white; padding: 30px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #admin-panel { display: none; background: var(--white); padding: 25px; border-radius: 20px; margin-top: -40px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 2px solid var(--accent); position: relative; z-index: 10; }
        input, textarea { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-family: inherit; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 40px; }
        .card { background: white; padding: 20px; border-radius: 18px; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.3s; border-right: 5px solid var(--primary); text-align: right; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .loading { text-align: center; padding: 20px; color: #64748b; grid-column: 1/-1; }
    </style>
</head>
<body>

<header>
    <h1>🎓 منصة دحيح التعليمية</h1>
    <p>مراجعات الشهادة الإعدادية - الترم الثاني</p>
</header>

<div class="container">
    <div id="admin-panel">
        <h2 style="color:var(--accent); margin-top:0;">🚀 نشر ملخص جديد</h2>
        <input type="text" id="title" placeholder="عنوان الملخص">
        <textarea id="desc" rows="2" placeholder="وصف الملخص"></textarea>
        <input type="text" id="fileUrl" placeholder="رابط الملف من جوجل درايف">
        <button class="btn" id="publish-btn" onclick="publish()">حفظ ونشر</button>
    </div>

    <div id="grid" class="grid"><div class="loading">جاري مزامنة الملخصات من الجدول...</div></div>
</div>

<script>
    // الرابط اللي أنت بعته يا محمد
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzOUCdfDNO2MjMt5D_Tuv4HejFHyAPsyo_y7yythhhZvz_FJxav8zovf6K0K_LjMR14UQ/exec";
    
    // رابط الـ CSV الموحد من صورك
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT45fa8xAftldlDmtA0kcoszlFdmmm7_ohbyOvWH-_btQQGgHOUuScma_3jcFNKnlbp5CbOdgirRV_/pub?output=csv";

    // الدخول بكلمة سر 1234
    let typed = "";
    window.addEventListener('keydown', (e) => {
        typed += e.key;
        if (typed.endsWith("1234")) {
            document.getElementById('admin-panel').style.display = 'block';
            window.scrollTo(0,0);
            typed = "";
        }
    });

    // وظيفة النشر في الجدول
    async function publish() {
        const title = document.getElementById('title').value;
        const desc = document.getElementById('desc').value;
        const fileUrl = document.getElementById('fileUrl').value;
        const btn = document.getElementById('publish-btn');

        if (!title || !fileUrl) return alert("اكتب البيانات كاملة");

        btn.innerText = "جاري الإرسال...";
        btn.disabled = true;

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ title, desc, fileUrl })
            });
            alert("تم الحفظ في الجدول! سيظهر في الموقع خلال ثواني.");
            location.reload();
        } catch (e) {
            alert("خطأ في الاتصال");
            btn.disabled = false;
        }
    }

    // وظيفة عرض البيانات من الجدول
    async function loadData() {
        try {
            const response = await fetch(CSV_URL + "&t=" + Date.now());
            const text = await response.text();
            
            // تحويل النص لصفوف وأعمدة
            const rows = text.split('\n').filter(r => r.trim() !== "");
            const grid = document.getElementById('grid');

            if (rows.length <= 1) {
                grid.innerHTML = "<div class='loading'>المنصة جاهزة.. انشر أول محتوى بـ 1234.</div>";
                return;
            }

            grid.innerHTML = "";
            // تخطي الصف الأول (العناوين) وعرض الكروت
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(',');
                if (cols[0]) {
                    grid.innerHTML += `
                        <div class="card" onclick="window.open('${cols[2].trim()}', '_blank')">
                            <h3>${cols[0]}</h3>
                            <p>${cols[1] || ''}</p>
                            <span style="color:var(--primary); font-weight:bold;">تحميل الملخص ←</span>
                        </div>`;
                }
            }
        } catch (e) {
            document.getElementById('grid').innerHTML = "<div class='loading'>تعذر تحميل البيانات. تأكد من إعدادات 'النشر على الويب'.</div>";
        }
    }

    loadData();
</script>
</body>
</html>
