<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة دحيح التعليمية 2026</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root { --primary: #2563eb; --accent: #f59e0b; --bg: #f8fafc; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #1e293b; }
        
        header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 2.2rem; display: flex; align-items: center; justify-content: center; gap: 12px; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        /* لوحة النشر السرية */
        #admin-panel { display: none; background: var(--white); padding: 30px; border-radius: 25px; margin-top: -60px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 2.5px solid var(--accent); position: relative; z-index: 100; }
        #admin-panel h2 { color: var(--accent); margin-top: 0; display: flex; align-items: center; gap: 10px; }
        input, textarea { width: 100%; padding: 15px; border: 1.5px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; font-size: 1rem; font-family: inherit; }
        .btn-publish { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; transition: 0.3s; }
        .btn-publish:hover { background: #1d4ed8; }

        /* شبكة عرض الملخصات */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 50px; }
        .card { background: white; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.3s; border-right: 6px solid var(--primary); display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(0,0,0,0.08); }
        .card h3 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.4rem; }
        .card p { color: #64748b; line-height: 1.6; margin-bottom: 20px; font-size: 0.95rem; }
        .card .download-btn { background: #eff6ff; color: var(--primary); padding: 10px; border-radius: 10px; text-align: center; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .status-msg { text-align: center; padding: 60px; color: #94a3b8; grid-column: 1/-1; font-size: 1.3rem; }
    </style>
</head>
<body>

<header>
    <h1><span class="material-symbols-rounded" style="font-size: 45px;">school</span> منصة دحيح التعليمية</h1>
    <p>بوابتك للتفوق في الشهادة الإعدادية - 2026</p>
</header>

<div class="container">
    <div id="admin-panel">
        <h2><span class="material-symbols-rounded">add_circle</span> إضافة محتوى جديد</h2>
        <input type="text" id="title" placeholder="اسم المادة أو المراجعة">
        <textarea id="desc" rows="2" placeholder="اكتب وصفاً مختصراً للملف..."></textarea>
        <input type="text" id="fileUrl" placeholder="رابط الملف (جوجل درايف)">
        <button class="btn-publish" id="publish-btn" onclick="publish()">نشر الآن على الموقع والجدول</button>
    </div>

    <div id="grid" class="grid">
        <div class="status-msg">جاري مزامنة أحدث الملخصات من الجدول...</div>
    </div>
</div>

<script>
    // 🔗 الروابط الخاصة بك
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxczycmkhPjf847dyEYr-jsR-wl9dx9OhF3bztM6nK3vf6qNwcZ7TJQx9J9R2vU5OoUIQ/exec";
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT45fa8xAftldlDmtA0kcoszlFdmmm7_ohbyOvWH-_btQQGgHOUuScma_3jcFNKnlbp5CbOdgirRV_/pub?output=csv";

    // 🔐 نظام الدخول السري (1234)
    let keys = "";
    window.addEventListener('keydown', (e) => {
        keys += e.key;
        if (keys.endsWith("1234")) {
            document.getElementById('admin-panel').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
            keys = "";
        }
    });

    // 📤 وظيفة النشر في الموقع والجدول
    async function publish() {
        const title = document.getElementById('title').value;
        const desc = document.getElementById('desc').value;
        const fileUrl = document.getElementById('fileUrl').value;
        const btn = document.getElementById('publish-btn');

        if (!title || !fileUrl) return alert("يرجى ملء الحقول الأساسية!");

        btn.innerText = "جاري الحفظ المزدوج...";
        btn.disabled = true;

        try {
            // إرسال البيانات للجدول عبر الرابط الجديد
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ title, desc, fileUrl })
            });

            alert("تم النشر بنجاح! سيتم تحديث المنصة فوراً.");
            
            // تحديث إجباري للموقع بعد 2.5 ثانية لضمان ظهور الكارت الجديد
            setTimeout(() => { location.reload(); }, 2500);

        } catch (err) {
            alert("حدث خطأ، تأكد من اتصالك بالإنترنت.");
            btn.disabled = false;
            btn.innerText = "نشر الآن";
        }
    }

    // 📥 وظيفة العرض المباشر من الجدول
    async function loadData() {
        try {
            // إضافة رمز زمن لمنع التخزين المؤقت (Cache) وضمان رؤية البيانات الجديدة فوراً
            const response = await fetch(CSV_URL + "&t=" + new Date().getTime());
            const text = await response.text();
            
            const rows = text.split('\n').filter(r => r.trim() !== '');
            const grid = document.getElementById('grid');

            if (rows.length <= 1) {
                grid.innerHTML = "<div class='status-msg'>المنصة جاهزة بانتظار أول منشور لك.. اكتب 1234 للبدء!</div>";
                return;
            }

            grid.innerHTML = "";
            // عرض الصفوف بترتيب عكسي (الأحدث يظهر أولاً)
            for (let i = rows.length - 1; i >= 1; i--) {
                const cols = rows[i].split(',');
                if (cols[0] && cols[0].trim() !== "") {
                    grid.innerHTML += `
                        <div class="card" onclick="window.open('${cols[2].trim()}', '_blank')">
                            <div>
                                <h3>${cols[0]}</h3>
                                <p>${cols[1] || 'مراجعة تعليمية شاملة للشهادة الإعدادية.'}</p>
                            </div>
                            <div class="download-btn">
                                <span class="material-symbols-rounded">download</span>
                                عرض وتحميل الملف
                            </div>
                        </div>
                    `;
                }
            }
        } catch (e) {
            document.getElementById('grid').innerHTML = "<div class='status-msg'>فشل الاتصال بالجدول. تأكد من إعدادات 'النشر على الويب'.</div>";
        }
    }

    loadData();
</script>

</body>
</html>
