<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FILE CLOUD | SIMPLE & POWERFUL</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    
    <style>
        :root { --primary: #4f46e5; --bg: #ffffff; --text: #1e293b; --light: #f1f5f9; }
        * { transition: all 0.3s ease; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }

        /* Notifications */
        #notify-container { position: fixed; top: 20px; left: 20px; z-index: 10000; }
        .toast { background: var(--text); color: #fff; padding: 12px 25px; border-radius: 10px; margin-bottom: 10px; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        nav { background: #fff; padding: 15px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--primary); cursor: pointer; display: flex; align-items: center; gap: 8px; }

        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }

        /* Publish Area */
        .publish-card { background: #fff; padding: 40px; border-radius: 30px; border: 1px solid #f0f0f0; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        input { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #eee; margin-bottom: 20px; font-family: 'Cairo'; outline: none; }
        input:focus { border-color: var(--primary); }

        .btn { padding: 15px 35px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; justify-content: center; font-size: 1rem; }
        .btn-main { background: var(--primary); color: white; width: 100%; }

        /* File View Style */
        .file-display { text-align: center; max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        .file-icon { font-size: 100px; color: var(--primary); margin-bottom: 20px; }
        .file-meta { display: flex; justify-content: center; gap: 20px; margin-top: 20px; font-weight: bold; opacity: 0.7; font-size: 0.9rem; }

        .timer-overlay { position: fixed; inset: 0; background: #fff; z-index: 6000; display: none; flex-direction: column; align-items: center; justify-content: center; }

        .page { display: none; }
        .active-page { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .file-item { background: #fff; padding: 25px; border-radius: 20px; border: 1px solid #f0f0f0; cursor: pointer; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .file-item:hover { transform: translateX(-5px); border-color: var(--primary); }
    </style>
</head>
<body>

<div id="notify-container"></div>

<div id="timer-screen" class="timer-overlay">
    <h1 style="font-size: 7rem; color: var(--primary); margin: 0;" id="timer-val">30</h1>
    <p style="font-weight: 900; font-size: 1.2rem;">جاري تحضير ملفك بأمان...</p>
</div>

<nav>
    <div class="logo" onclick="location.hash=''; location.reload()">
        <span class="material-symbols-rounded">cloud_done</span> FILE CLOUD ☁️ __ACTIVE
    </div>
    <button class="btn btn-main" style="width:auto" onclick="showPage('publish-page')">نشر جديد +</button>
</nav>

<div class="container">
    <div id="home-page" class="page active-page">
        <h2 style="font-weight: 900; margin-bottom: 30px;">ملفاتك المنشورة</h2>
        <div id="files-list">جاري المزامنة...</div>
    </div>

    <div id="publish-page" class="page">
        <div class="publish-card">
            <h2 style="margin-top:0">بيانات النشر</h2>
            <div style="border: 2px dashed var(--primary); padding: 40px; text-align: center; border-radius: 20px; cursor: pointer; margin-bottom: 25px; background: #f8f9ff;" onclick="document.getElementById('file-in').click()">
                <span class="material-symbols-rounded" style="font-size: 3rem; color: var(--primary);">upload_file</span>
                <p id="file-status" style="font-weight: bold;">اضغط لاختيار الملف من جهازك</p>
                <input type="file" id="file-in" hidden onchange="onFileSelect(event)">
            </div>
            <input type="text" id="in-user" placeholder="اسمك كناشر">
            <input type="text" id="in-title" placeholder="عنوان الملف للمشاهدين">
            
            <div style="background: #f1f5f9; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 25px;">
                <p id="cap-q" style="margin:0; font-weight: 900;"></p>
                <input type="number" id="cap-a" placeholder="الحل" style="width:100px; text-align:center; margin-top:10px; margin-bottom:0;">
            </div>

            <button class="btn btn-main" id="pub-btn" onclick="publishFile()">تأكيد ونشر الآن</button>
        </div>
    </div>

    <div id="view-page" class="page">
        <div id="file-view-content" class="file-display"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzrOSP5BrtdXRXPODPlxYK8f1h78iYAYjjPHFLDGm-TUTUROCtiOlyZYNM2e2b7Zic/exec";
    let selectedBlob, capRes, allFiles = [], activeFile;

    function toast(m) {
        const c = document.getElementById('notify-container');
        const t = document.createElement('div'); t.className = 'toast'; t.innerText = m;
        c.appendChild(t); setTimeout(() => t.remove(), 3000);
    }

    function genCap() {
        const a = Math.floor(Math.random()*15), b = Math.floor(Math.random()*15);
        capRes = a + b;
        document.getElementById('cap-q').innerText = `اختبار أمان: ${a} + ${b} = ؟`;
    }

    function onFileSelect(e) {
        selectedBlob = e.target.files[0];
        document.getElementById('file-status').innerText = "تم اختيار: " + selectedBlob.name;
    }

    async function publishFile() {
        const u = document.getElementById('in-user').value, t = document.getElementById('in-title').value, a = document.getElementById('cap-a').value;
        const btn = document.getElementById('pub-btn');
        if(!selectedBlob || !u || !t || parseInt(a) !== capRes) return toast("❌ أكمل البيانات بشكل صحيح");

        btn.disabled = true; btn.innerText = "جاري النشر...";

        try {
            const formData = new FormData();
            formData.append("reqtype", "fileupload");
            formData.append("fileToUpload", selectedBlob);
            
            const uploadRes = await fetch("https://catbox.moe/user/api.php", { method: "POST", body: formData });
            const fileUrl = await uploadRes.text();

            if(!fileUrl.includes("http")) throw new Error();

            const data = {
                id: "F-" + Math.random().toString(36).substr(2, 9),
                u: u, t: t, 
                type: selectedBlob.name.split('.').pop().toUpperCase(), 
                size: (selectedBlob.size/1024/1024).toFixed(2)+" MB",
                date: new Date().toLocaleDateString('ar-EG'),
                url: fileUrl
            };

            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            
            toast("✅ تم النشر بنجاح!");
            setTimeout(() => location.reload(), 1000);
        } catch (e) {
            toast("❌ حدث خطأ.. حاول مرة أخرى");
            btn.disabled = false; btn.innerText = "تأكيد ونشر الآن";
        }
    }

    async function renderHome() {
        const list = document.getElementById('files-list');
        try {
            const res = await fetch(SCRIPT_URL);
            allFiles = await res.json();
            list.innerHTML = "";
            if(allFiles.length === 0) list.innerHTML = "لا توجد ملفات حالياً";
            allFiles.forEach(f => {
                list.innerHTML += `<div class="file-item" onclick="viewFile('${f.id}')">
                    <div>
                        <h3 style="margin:0">${f.t}</h3>
                        <span style="font-size:0.8rem; opacity:0.6">${f.type} | ${f.size}</span>
                    </div>
                    <span class="material-symbols-rounded">chevron_left</span>
                </div>`;
            });
        } catch (e) { list.innerHTML = "فشل تحديث القائمة"; }
    }

    function viewFile(id) {
        activeFile = allFiles.find(x => x.id === id);
        if(!activeFile) return;
        window.location.hash = "f=" + id;
        renderFilePage(activeFile);
        showPage('view-page');
    }

    function renderFilePage(f) {
        document.getElementById('file-view-content').innerHTML = `
            <div class="file-icon"><span class="material-symbols-rounded" style="font-size:120px">description</span></div>
            <h1 style="font-size:2.5rem; margin:0;">${f.t}</h1>
            <div class="file-meta"><span>الصيغة: ${f.type}</span><span>•</span><span>الحجم: ${f.size}</span><span>•</span><span>التاريخ: ${f.date}</span></div>
            <p style="margin-top:20px; font-weight:bold; opacity:0.6;">تم الرفع بواسطة: ${f.u}</p>
            <div style="margin-top:40px;">
                <button class="btn btn-main" style="width:auto; padding:20px 60px;" onclick="startDownload()">بدء التحميل الآمن</button>
                <br><button class="btn" style="background:transparent; color:var(--primary); margin-top:15px;" onclick="copyLink()">نسخ رابط الملف</button>
            </div>`;
    }

    function startDownload() {
        const o = document.getElementById('timer-screen'), v = document.getElementById('timer-val');
        let s = 30; o.style.display = 'flex'; v.innerText = s;
        const clock = setInterval(() => {
            s--; v.innerText = s;
            if(s <= 0) {
                clearInterval(clock); o.style.display = 'none';
                toast("✅ جاري التحميل...");
                const a = document.createElement('a'); a.href = activeFile.url; a.download = ""; a.click();
            }
        }, 1000);
    }

    function copyLink() { navigator.clipboard.writeText(window.location.href); toast("🔗 تم نسخ الرابط!"); }
    function showPage(p) { 
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page')); 
        document.getElementById(p).classList.add('active-page'); 
        if(p === 'publish-page') genCap();
    }
    function checkHash() { 
        const h = window.location.hash; 
        if(h.includes('f=')) {
            const id = h.split('f=')[1];
            if(allFiles.length > 0) viewFile(id);
        } else showPage('home-page'); 
    }
    window.onload = async () => { await renderHome(); checkHash(); };
    window.onhashchange = checkHash;
</script>
</body>
</html>
