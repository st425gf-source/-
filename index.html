<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة دحيح التعليمية 2026</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root { --primary: #2563eb; --accent: #f59e0b; --bg: #f8fafc; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #1e293b; }
        
        /* الهيدر */
        header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 2rem; display: flex; align-items: center; justify-content: center; gap: 15px; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        /* لوحة النشر السرية */
        #admin-panel { display: none; background: var(--white); padding: 30px; border-radius: 25px; margin-top: -50px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 2px solid var(--accent); position: relative; z-index: 100; }
        #admin-panel h2 { color: var(--accent); margin-top: 0; display: flex; align-items: center; gap: 10px; }
        input, textarea { width: 100%; padding: 15px; border: 1.5px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; font-size: 1rem; }
        .btn-publish { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; transition: 0.3s; }
        .btn-publish:disabled { background: #cbd5e1; }

        /* شبكة الملخصات */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 50px; }
        .card { background: white; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.3s; border-right: 6px solid var(--primary); display: flex; flex-direction: column; justify-content: space-between; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(0,0,0,0.08); }
        .card h3 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.3rem; }
        .card p { color: #64748b; line-height: 1.6; margin-bottom: 20px; }
        .card .download-label { font-weight: bold; color: var(--primary); display: flex; align-items: center; gap: 5px; }

        .status-msg { text-align: center; padding: 50px; color: #94a3b8; grid-column: 1/-1; font-size: 1.2rem; }
    </style>
</head>
<body>

<header>
    <h1><span class="material-symbols-rounded" style="font-size: 40px;">auto_stories</span> منصة دحيح التعليمية</h1>
    <p>أقوى مراجعات الشهادة الإعدادية - دفعة 2026</p>
</header>

<div class="container">
    <div id="admin-panel">
        <h2><span class="material-symbols-rounded">edit_note</span> إضافة ملخص جديد</h2>
        <input type="text" id="title" placeholder="عنوان المادة (مثلاً: جبر وتربية فنية)">
        <textarea id="desc" rows="2" placeholder="اكتب هنا تفاصيل بسيطة عن الملف..."></textarea>
        <input type="text" id="fileUrl" placeholder="رابط الملف من جوجل درايف">
        <button class="btn-publish" id="publish-btn" onclick="publish()">نشر على المنصة الآن</button>
    </div>

    <div id="grid" class="grid">
        <div class="status-msg">جاري تحميل أحدث البيانات من الجدول...</div>
    </div>
</div>

<script>
    // 🔗 الروابط الخاصة بك يا محمد (لا تقم بتغييرها)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzOUCdfDNO2MjMt5D_Tuv4HejFHyAPsyo_y7yythhhZvz_FJxav8zovf6K0K_LjMR14UQ/exec";
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT45fa8xAftldlDmtA0kcoszlFdmmm7_ohbyOvWH-_btQQGgHOUuScma_3jcFNKnlbp5CbOdgirRV_/pub?output=csv";

    // 🔑 نظام الدخول السري (اكتب 1234 على الكيبورد)
    let secretCode = "";
    window.addEventListener('keydown', (e) => {
        secretCode += e.key;
        if (secretCode.endsWith("1234")) {
            document.getElementById('admin-panel').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
            secretCode = "";
        }
    });

    // 🚀 وظيفة النشر (إرسال البيانات للجدول)
    async function publish() {
        const title = document.getElementById('title').value;
        const desc = document.getElementById('desc').value;
        const fileUrl = document.getElementById('fileUrl').value;
        const btn = document.getElementById('publish-btn');

        if (!title || !fileUrl) return alert("من فضلك اكتب العنوان ورابط الملف!");

        btn.innerText = "جاري الحفظ في الجدول...";
        btn.disabled = true;

        try {
            // إرسال البيانات (استخدام no-cors لأن Apps Script لا يدعم CORS بشكل مباشر)
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ title, desc, fileUrl })
            });

            alert("تم النشر بنجاح! سيظهر الملخص هنا خلال ثواني.");
            
            // تحديث إجباري للموقع بعد 3 ثواني لضمان ظهور البيانات الجديدة
            setTimeout(() => { location.reload(); }, 3000);

        } catch (error) {
            alert("حدث خطأ في الاتصال، حاول مرة أخرى.");
            btn.disabled = false;
            btn.innerText = "نشر الآن";
        }
    }

    // 📥 وظيفة العرض (قراءة البيانات من الجدول)
    async function loadData() {
        try {
            // إضافة رمز عشوائي للرابط لمنع "الكاش" لضمان رؤية أحدث البيانات
            const response = await fetch(CSV_URL + "&cache_bust=" + Date.now());
            const data = await response.text();
            
            const rows = data.split('\n').filter(row => row.trim() !== '');
            const grid = document.getElementById('grid');

            // إذا كان الجدول يحتوي على العناوين فقط
            if (rows.length <= 1) {
                grid.innerHTML = "<div class='status-msg'>المنصة جاهزة! ابدأ بنشر أول ملخص باستخدام الكود السري.</div>";
                return;
            }

            // عرض البيانات في كروت
            grid.innerHTML = rows.slice(1).map(row => {
                const cols = row.split(',');
                if (!cols[0]) return ''; // تخطي الصفوف الفارغة
                return `
                    <div class="card" onclick="window.open('${cols[2].trim()}', '_blank')">
                        <div>
                            <h3>${cols[0]}</h3>
                            <p>${cols[1] || 'لا يوجد وصف متاح لهذا الملف.'}</p>
                        </div>
                        <div class="download-label">
                            <span class="material-symbols-rounded">download_for_offline</span>
                            تحميل الملف الآن
                        </div>
                    </div>
                `;
            }).join('');
        } catch (e) {
            document.getElementById('grid').innerHTML = "<div class='status-msg'>تعذر الاتصال بالجدول. تأكد من إعدادات 'النشر على الويب'.</div>";
        }
    }

    // تشغيل التحميل عند فتح الموقع
    loadData();
</script>

</body>
</html>
