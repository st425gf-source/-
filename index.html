<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FILE CLOUD | STUDY SPACE</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    
    <style>
        :root { --primary: #4f46e5; --bg: #ffffff; --text: #1e293b; --light: #f1f5f9; }
        * { transition: all 0.2s ease; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }

        /* تجميل الصفحة الرئيسية */
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; height: 90vh; overflow-y: auto; }
        nav { background: #fff; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--light); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.3rem; font-weight: 900; color: var(--primary); cursor: pointer; display: flex; align-items: center; gap: 8px; }

        /* كروت الملفات */
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .file-card { background: #fff; padding: 20px; border-radius: 20px; border: 2px solid #eee; cursor: pointer; position: relative; }
        .file-card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .file-type-badge { position: absolute; top: 15px; left: 15px; background: var(--primary); color: #fff; padding: 2px 10px; border-radius: 8px; font-size: 0.7rem; }

        /* واجهة المذاكرة (النظام المنقسم) */
        .study-workspace { display: none; height: calc(100vh - 70px); grid-template-columns: 1fr 1fr; background: #eee; }
        .pdf-viewer { background: #525659; border-left: 2px solid #ccc; position: relative; }
        .whiteboard-area { background: #fff; position: relative; display: flex; flex-direction: column; }
        
        /* شريط أدوات السبورة */
        .toolbar { background: #fff; padding: 10px; display: flex; gap: 10px; align-items: center; border-bottom: 2px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tool { width: 40px; height: 40px; border-radius: 10px; border: 1px solid #ddd; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #fff; }
        .tool.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .color-dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-dot.selected { border-color: #000; }

        iframe { width: 100%; height: 100%; border: none; }
        canvas { flex-grow: 1; cursor: crosshair; touch-action: none; }

        .page { display: none; }
        .active-page { display: block; }
        .active-flex { display: grid; }

        #notify-container { position: fixed; top: 80px; left: 20px; z-index: 10000; }
        .toast { background: var(--text); color: #fff; padding: 10px 20px; border-radius: 10px; margin-bottom: 5px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="notify-container"></div>

<nav>
    <div class="logo" onclick="location.hash=''; location.reload()">
        <span class="material-symbols-rounded">edit_note</span> FILE CLOUD <span style="color: #999; font-weight: 400;">| STUDY</span>
    </div>
    <div id="file-info-top" style="display: none; font-weight: bold; font-size: 0.9rem;">
        📝 <span id="current-file-name">اسم الملف</span> 
        | 👤 <span id="current-file-user">المدير</span>
        | 📂 <span id="current-file-type">PDF</span>
    </div>
</nav>

<div id="home-page" class="container page active-page">
    <h1 style="font-weight: 900; font-size: 1.8rem;">مساحة المذاكرة التفاعلية 🚀</h1>
    <p style="opacity: 0.6;">اختر ملفاً لفتحه في السبورة الذكية مباشرة</p>
    <div id="files-list" class="file-grid">جاري تحميل السحابة...</div>
</div>

<div id="study-page" class="study-workspace page">
    <div class="pdf-viewer">
        <iframe id="pdf-frame" src=""></iframe>
    </div>

    <div class="whiteboard-area">
        <div class="toolbar">
            <button class="tool active" id="penTool" onclick="setTool('pen')"><span class="material-symbols-rounded">edit</span></button>
            <button class="tool" id="eraserTool" onclick="setTool('eraser')"><span class="material-symbols-rounded">auto_fix_normal</span></button>
            <div style="width: 2px; height: 30px; background: #eee;"></div>
            <div class="color-dot selected" style="background: #000;" onclick="setColor('#000', this)"></div>
            <div class="color-dot" style="background: #f44336;" onclick="setColor('#f44336', this)"></div>
            <div class="color-dot" style="background: #4caf50;" onclick="setColor('#4caf50', this)"></div>
            <div class="color-dot" style="background: #2196f3;" onclick="setColor('#2196f3', this)"></div>
            <button class="btn" style="padding: 5px 15px; margin-right: auto; background: #f1f5f9; color: #333; font-size: 0.8rem;" onclick="clearCanvas()">مسح السبورة</button>
        </div>
        <canvas id="canvas"></canvas>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzrOSP5BrtdXRXPODPlxYK8f1h78iYAYjjPHFLDGm-TUTUROCtiOlyZYNM2e2b7Zic/exec";
    
    const manualFile = {
        id: "ALGEBRA_UNIT_1",
        t: "شرح الجبر - الوحدة الأولى - 3ع",
        type: "PDF",
        size: "1.2 MB",
        date: "2024",
        u: "المدير",
        url: "https://raw.githubusercontent.com/mozilla/pdf.js/ba2edeae/web/compressed.tracemonkey-pldi-09.pdf" // رابط تجريبي لملف PDF
    };

    let allFiles = [], activeFile;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let painting = false, tool = 'pen', color = '#000';

    function toast(m) {
        const c = document.getElementById('notify-container');
        const t = document.createElement('div'); t.className = 'toast'; t.innerText = m;
        c.appendChild(t); setTimeout(() => t.remove(), 3000);
    }

    async function init() {
        const list = document.getElementById('files-list');
        try {
            const res = await fetch(SCRIPT_URL);
            allFiles = await res.json();
            allFiles.unshift(manualFile);
        } catch (e) { allFiles = [manualFile]; }
        
        list.innerHTML = "";
        allFiles.forEach(f => {
            list.innerHTML += `
            <div class="file-card" onclick="openStudySpace('${f.id}')">
                <span class="file-type-badge">${f.type}</span>
                <div style="font-size: 40px; margin-bottom: 10px; color: var(--primary)">
                    <span class="material-symbols-rounded" style="font-size: 50px">menu_book</span>
                </div>
                <h3 style="margin:0; font-size: 1rem;">${f.t}</h3>
                <p style="font-size: 0.8rem; opacity: 0.6; margin: 5px 0;">بواسطة: ${f.u}</p>
            </div>`;
        });
        resizeCanvas();
    }

    function openStudySpace(id) {
        activeFile = allFiles.find(x => x.id === id);
        if(!activeFile) return;
        
        // تحديث معلومات الشريط العلوي
        document.getElementById('current-file-name').innerText = activeFile.t;
        document.getElementById('current-file-user').innerText = activeFile.u;
        document.getElementById('current-file-type').innerText = activeFile.type;
        document.getElementById('file-info-top').style.display = "block";

        // تشغيل الملف في الـ Frame
        document.getElementById('pdf-frame').src = activeFile.url;

        // تبديل الصفحات
        document.getElementById('home-page').classList.remove('active-page');
        document.getElementById('study-page').classList.add('active-flex');
        
        toast("📖 تم فتح مساحة العمل.. ذاكر بذكاء!");
        resizeCanvas();
    }

    // منطق السبورة الذكية
    function resizeCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        ctx.lineCap = 'round';
        ctx.lineWidth = 3;
    }

    function startPosition(e) { painting = true; draw(e); }
    function finishedPosition() { painting = false; ctx.beginPath(); }
    
    function draw(e) {
        if (!painting) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches[0].clientX) - rect.left;
        const y = (e.clientY || e.touches[0].clientY) - rect.top;

        ctx.strokeStyle = (tool === 'eraser') ? '#fff' : color;
        ctx.lineWidth = (tool === 'eraser') ? 20 : 3;

        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    function setTool(t) {
        tool = t;
        document.querySelectorAll('.tool').forEach(el => el.classList.remove('active'));
        document.getElementById(t + 'Tool').classList.add('active');
    }

    function setColor(c, el) {
        color = c;
        setTool('pen');
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
        el.classList.add('selected');
    }

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); toast("🧹 تم مسح السبورة"); }

    canvas.addEventListener('mousedown', startPosition);
    canvas.addEventListener('mouseup', finishedPosition);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e); });
    canvas.addEventListener('touchend', finishedPosition);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

    window.addEventListener('resize', resizeCanvas);
    window.onload = init;
</script>
</body>
</html>
